---
layout: default
---
<article class="doc">
  <div class="wrap narrow">
    {% if page.title %}
    <header class="doc-header">
      <p class="eyebrow">{{ page.eyebrow | default: "Documentation" }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.description %}<p class="lede">{{ page.description }}</p>{% endif %}
    </header>
    {% endif %}
    <div class="doc-body">
      {{ content }}
    </div>
    <nav class="doc-foot" aria-label="Section">
      <a href="{{ '/' | relative_url }}">← Back to overview</a>
    </nav>
  </div>
</article>
