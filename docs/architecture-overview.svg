  <text x="170" y="112" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#F3F3F0" text-anchor="middle" font-weight="bold">CONSUMERS</text>

  <text x="56" y="142" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#0F0F10" font-weight="bold">apps &amp; tools</text>
  <text x="56" y="158" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  curl / fetch clients</text>
  <text x="56" y="172" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  OpenCode (TUI / CLI)</text>
