  <text x="796" y="358" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  gpt-4o-mini-tts</text>

  <rect x="796" y="372" width="348" height="28" fill="none" stroke="#FF6A00" stroke-width="1.5"/>
  <text x="970" y="390" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#0F0F10" text-anchor="middle">local key auth disabled  &#183;  reachable only via APIM or owner Entra</text>

  <line x1="40" y1="438" x2="1160" y2="438" stroke="#C8C8C0" stroke-width="1"/>
  <text x="600" y="460" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#7A7A72" text-anchor="middle">one APIM key &#183; many models &#183; OpenAI-compatible surface for OpenCode and any HTTP client</text>
