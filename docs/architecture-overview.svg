  <text x="56" y="234" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  api-key header only</text>
  <text x="56" y="248" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  no Azure portal access</text>
  <text x="56" y="262" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  no Entra tokens</text>

  <line x1="56" y1="276" x2="284" y2="276" stroke="#C8C8C0" stroke-width="0.8"/>

