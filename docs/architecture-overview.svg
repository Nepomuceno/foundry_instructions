  <text x="796" y="216" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  gpt-5 / 5.2 / 5.1-codex-mini</text>
  <text x="796" y="230" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  Mistral-Large-3 &#183; gpt-oss-120b</text>
  <text x="796" y="244" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  Grok-4-1 &#183; Grok-4-20 &#183; Phi-4</text>

