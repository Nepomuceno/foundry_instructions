  <text x="56" y="324" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  /openai/deployments/*</text>
  <text x="56" y="338" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  /admin-m8.../providers/*</text>

