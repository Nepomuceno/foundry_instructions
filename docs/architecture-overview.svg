  <rect x="0" y="0" width="1200" height="480" fill="#F3F3F0" stroke="#0F0F10" stroke-width="3"/>

  <rect x="0" y="0" width="1200" height="36" fill="#0F0F10"/>
  <text x="16" y="24" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#F3F3F0" font-weight="bold">foundry-instructions</text>
  <text x="1184" y="24" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#C8C8C0" text-anchor="end">Azure AI Foundry &#183; APIM gateway &#183; consumer access</text>

