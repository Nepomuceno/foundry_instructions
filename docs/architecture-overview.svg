  <text x="386" y="250" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  /openai/v1/*     wildcard v1</text>
  <text x="386" y="264" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7A7A72">  /admin-m8.../*   pass-through</text>

