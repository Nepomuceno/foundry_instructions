<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540">
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="540" fill="#faf6ed" stroke="#2c2417" stroke-width="3" rx="0"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="36" fill="#2c2417" rx="0"/>
  <text x="16" y="24" font-size="14" font-weight="bold" fill="#faf6ed" font-family="'IBM Plex Mono', monospace">ADR &#183; specto-model-provisioning-from-oslz</text>
  <text x="1184" y="24" font-size="11" fill="#c4b99a" text-anchor="end" font-family="'IBM Plex Mono', monospace">2026-05-10 &#183; Active</text>

  <!-- ============================================ -->
  <!-- LEFT: Classification tier diagram            -->
  <!-- ============================================ -->

  <text x="40" y="70" font-size="10" font-weight="bold" fill="#2c2417" font-family="'IBM Plex Mono', monospace">CLASSIFICATION TIERS</text>
  <line x1="40" y1="76" x2="220" y2="76" stroke="#2c2417" stroke-width="1"/>

  <!-- OSLZ tier (higher) -->
  <rect x="40" y="92" width="260" height="64" fill="#2c2417" stroke="#2c2417" stroke-width="2" rx="0"/>
  <text x="56" y="116" font-size="13" fill="#faf6ed" font-family="'IBM Plex Mono', monospace" font-weight="bold">OSLZ</text>
  <text x="56" y="134" font-size="9" fill="#c4b99a" font-family="'IBM Plex Mono', monospace">Official Sensitive</text>
  <text x="56" y="146" font-size="9" fill="#c4b99a" font-family="'IBM Plex Mono', monospace">Landing Zone</text>
  <text x="284" y="116" font-size="10" fill="#c4b99a" text-anchor="end" font-family="'IBM Plex Mono', monospace">higher</text>
  <text x="284" y="130" font-size="10" fill="#c4b99a" text-anchor="end" font-family="'IBM Plex Mono', monospace">classification</text>
  <text x="284" y="146" font-size="14" fill="#faf6ed" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-weight="bold">&#9650;&#9650;</text>

  <!-- Vertical relationship -->
  <line x1="170" y1="156" x2="170" y2="184" stroke="#2c2417" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="180" y="174" font-size="9" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">cleared here</text>
  <text x="180" y="186" font-size="9" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">=&gt; cleared below</text>

  <!-- Specto tier (lower) -->
  <rect x="40" y="194" width="260" height="64" fill="none" stroke="#2c2417" stroke-width="2" rx="0"/>
  <text x="56" y="218" font-size="13" fill="#2c2417" font-family="'IBM Plex Mono', monospace" font-weight="bold">Specto</text>
  <text x="56" y="236" font-size="9" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">downstream environment</text>
  <text x="56" y="248" font-size="9" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">target of this ADR</text>
  <text x="284" y="218" font-size="10" fill="#6b5d4f" text-anchor="end" font-family="'IBM Plex Mono', monospace">lower</text>
  <text x="284" y="232" font-size="10" fill="#6b5d4f" text-anchor="end" font-family="'IBM Plex Mono', monospace">classification</text>
  <text x="284" y="248" font-size="14" fill="#2c2417" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-weight="bold">&#9650;</text>

  <!-- Caption under the tier diagram -->
  <text x="170" y="284" font-size="9" fill="#6b5d4f" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-style="italic">Transitivity is the whole argument.</text>

  <!-- ============================================ -->
  <!-- CENTRE: The rule                            -->
  <!-- ============================================ -->

  <text x="340" y="70" font-size="10" font-weight="bold" fill="#2c2417" font-family="'IBM Plex Mono', monospace">THE RULE</text>
  <line x1="340" y1="76" x2="1160" y2="76" stroke="#2c2417" stroke-width="1"/>

  <!-- Big rule statement -->
  <text x="340" y="106" font-size="13" fill="#2c2417" font-family="'IBM Plex Mono', monospace">A model already approved on OSLZ may be provisioned on Specto</text>
  <text x="340" y="124" font-size="13" fill="#2c2417" font-family="'IBM Plex Mono', monospace">without a fresh per-model ADR &mdash; <tspan font-weight="bold">if all four conditions hold.</tspan></text>

  <!-- Four-condition checklist -->
  <rect x="340" y="148" width="820" height="148" fill="#2c2417" stroke="#2c2417" stroke-width="2" rx="0"/>

  <!-- Condition 1 -->
  <rect x="358" y="166" width="22" height="22" fill="#faf6ed" stroke="#faf6ed" stroke-width="1" rx="0"/>
  <polyline points="362,177 368,183 378,170" fill="none" stroke="#2c2417" stroke-width="2.5" stroke-linecap="square"/>
  <text x="392" y="183" font-size="12" fill="#faf6ed" font-family="'IBM Plex Mono', monospace" font-weight="bold">Approved on OSLZ</text>
  <text x="392" y="199" font-size="10" fill="#c4b99a" font-family="'IBM Plex Mono', monospace">verified on-trust within team</text>

  <!-- Condition 2 -->
  <rect x="358" y="218" width="22" height="22" fill="#faf6ed" stroke="#faf6ed" stroke-width="1" rx="0"/>
  <polyline points="362,229 368,235 378,222" fill="none" stroke="#2c2417" stroke-width="2.5" stroke-linecap="square"/>
  <text x="392" y="235" font-size="12" fill="#faf6ed" font-family="'IBM Plex Mono', monospace" font-weight="bold">Vendor not on disapproved-countries list</text>
  <text x="392" y="251" font-size="10" fill="#c4b99a" font-family="'IBM Plex Mono', monospace">exclusion list, not whitelist</text>

  <!-- Condition 3 -->
  <rect x="758" y="166" width="22" height="22" fill="#faf6ed" stroke="#faf6ed" stroke-width="1" rx="0"/>
  <polyline points="762,177 768,183 778,170" fill="none" stroke="#2c2417" stroke-width="2.5" stroke-linecap="square"/>
  <text x="792" y="183" font-size="12" fill="#faf6ed" font-family="'IBM Plex Mono', monospace" font-weight="bold">Provisioned via Azure AI Foundry</text>
  <text x="792" y="199" font-size="10" fill="#c4b99a" font-family="'IBM Plex Mono', monospace">platform audit + policy controls</text>

  <!-- Condition 4 -->
  <rect x="758" y="218" width="22" height="22" fill="#faf6ed" stroke="#faf6ed" stroke-width="1" rx="0"/>
  <polyline points="762,229 768,235 778,222" fill="none" stroke="#2c2417" stroke-width="2.5" stroke-linecap="square"/>
  <text x="792" y="235" font-size="12" fill="#faf6ed" font-family="'IBM Plex Mono', monospace" font-weight="bold">Region UK South</text>
  <text x="792" y="251" font-size="10" fill="#c4b99a" font-family="'IBM Plex Mono', monospace">sovereignty + locality</text>

  <!-- Bottom strip inside the rule box: outcome -->
  <line x1="358" y1="270" x2="1142" y2="270" stroke="#c4b99a" stroke-width="1"/>
  <text x="358" y="288" font-size="11" fill="#c4b99a" font-family="'IBM Plex Mono', monospace">ALL HOLD &nbsp;&#8594;</text>
  <text x="468" y="288" font-size="12" fill="#faf6ed" font-family="'IBM Plex Mono', monospace" font-weight="bold">provision on Specto, no fresh ADR</text>
  <text x="1142" y="288" font-size="11" fill="#c4b99a" text-anchor="end" font-family="'IBM Plex Mono', monospace">derisk by reuse</text>

  <!-- ============================================ -->
  <!-- LOWER STRIP: Before / After comparison      -->
  <!-- ============================================ -->

  <text x="40" y="350" font-size="10" font-weight="bold" fill="#2c2417" font-family="'IBM Plex Mono', monospace">FOR THE COMMON CASE &#183; OSLZ-CLEARED + FOUNDRY + UK SOUTH</text>
  <line x1="40" y1="356" x2="660" y2="356" stroke="#2c2417" stroke-width="1"/>

  <!-- Before -->
  <rect x="40" y="372" width="540" height="80" fill="none" stroke="#6b5d4f" stroke-width="1.5" rx="0"/>
  <text x="56" y="394" font-size="10" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">BEFORE</text>
  <text x="56" y="416" font-size="11" fill="#2c2417" font-family="'IBM Plex Mono', monospace">OSLZ ADR</text>
  <rect x="148" y="406" width="20" height="14" fill="#2c2417"/>
  <text x="174" y="416" font-size="11" fill="#2c2417" font-family="'IBM Plex Mono', monospace">+ Specto ADR</text>
  <rect x="294" y="406" width="20" height="14" fill="#2c2417"/>
  <text x="320" y="416" font-size="11" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">= 2 approvals per model</text>
  <text x="56" y="438" font-size="9" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">duplicated review effort, implicit overclassification</text>

  <!-- After -->
  <rect x="40" y="464" width="540" height="56" fill="none" stroke="#2c2417" stroke-width="2" rx="0"/>
  <text x="56" y="486" font-size="10" fill="#2c2417" font-weight="bold" font-family="'IBM Plex Mono', monospace">AFTER</text>
  <text x="56" y="508" font-size="11" fill="#2c2417" font-family="'IBM Plex Mono', monospace">OSLZ ADR</text>
  <rect x="148" y="498" width="20" height="14" fill="#2c2417"/>
  <text x="174" y="508" font-size="11" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">= 1 approval, Specto inherits</text>

  <!-- ============================================ -->
  <!-- LOWER RIGHT: Fallback note (small)          -->
  <!-- ============================================ -->

  <text x="620" y="350" font-size="10" font-weight="bold" fill="#2c2417" font-family="'IBM Plex Mono', monospace">IF ANY CONDITION FAILS</text>
  <line x1="620" y1="356" x2="1160" y2="356" stroke="#2c2417" stroke-width="1"/>

  <rect x="620" y="372" width="540" height="148" fill="none" stroke="#6b5d4f" stroke-width="1.5" rx="0"/>
  <text x="638" y="394" font-size="11" fill="#2c2417" font-family="'IBM Plex Mono', monospace" font-weight="bold">Existing per-model-family ADR process applies in full</text>
  <line x1="638" y1="402" x2="1142" y2="402" stroke="#c4b99a" stroke-width="1"/>

  <text x="638" y="422" font-size="10" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">&bull; non-Foundry deployment</text>
  <text x="638" y="438" font-size="10" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">&bull; region other than UK South</text>
  <text x="638" y="454" font-size="10" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">&bull; not yet OSLZ-approved</text>
  <text x="638" y="470" font-size="10" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace">&bull; vendor on disapproved-countries list</text>

  <text x="638" y="496" font-size="9" fill="#6b5d4f" font-family="'IBM Plex Mono', monospace" font-style="italic">licensing review &#183; fitness-for-use &#183; SBD</text>
  <text x="638" y="510" font-size="9" fill="#c4b99a" font-family="'IBM Plex Mono', monospace" font-style="italic">unchanged by this decision</text>
</svg>
